<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>직원 급여명세서 조회</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .login-card {
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.95);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  
  <!-- 로그인 화면 -->
  <div id="login-view" class="login-card rounded-2xl shadow-2xl p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-gradient-to-r from-purple-600 to-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-file-invoice-dollar text-white text-2xl"></i>
      </div>
      <h1 class="text-3xl font-bold text-gray-800 mb-2">급여명세서 조회</h1>
      <p class="text-gray-600 text-sm">KINDWON 직원 전용</p>
    </div>

    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          <i class="fas fa-user mr-2 text-purple-600"></i>이름
        </label>
        <input 
          type="text" 
          id="emp-name" 
          placeholder="홍길동"
          class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-purple-600 transition-colors"
          onkeypress="if(event.key==='Enter') document.getElementById('emp-password').focus()">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          <i class="fas fa-lock mr-2 text-purple-600"></i>비밀번호
        </label>
        <div class="relative">
          <input 
            type="password" 
            id="emp-password" 
            placeholder="비밀번호 (초기: 전화번호 뒷자리)"
            class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-purple-600 transition-colors pr-12"
            onkeypress="if(event.key==='Enter') loginEmployee()">
          <button 
            type="button"
            onclick="togglePassword()"
            class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600">
            <i id="password-icon" class="fas fa-eye"></i>
          </button>
        </div>
        <p class="text-xs text-gray-500 mt-1">
          <i class="fas fa-info-circle mr-1"></i>초기 비밀번호는 전화번호 뒷자리 4자리입니다
        </p>
      </div>

      <button 
        onclick="loginEmployee()" 
        class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg hover:from-purple-700 hover:to-indigo-700 transition-all active:scale-95">
        <i class="fas fa-sign-in-alt mr-2"></i>로그인
      </button>

      <div id="error-message" class="hidden bg-red-50 border-2 border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm">
        <i class="fas fa-exclamation-triangle mr-2"></i>
        <span id="error-text"></span>
      </div>

      <div class="text-center pt-4 border-t">
        <p class="text-sm text-gray-600">
          <i class="fas fa-question-circle mr-1"></i>
          비밀번호를 잊으셨나요? 관리자에게 문의하세요.
        </p>
      </div>
    </div>
  </div>

  <!-- 비밀번호 변경 화면 -->
  <div id="change-password-view" class="hidden login-card rounded-2xl shadow-2xl p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-gradient-to-r from-orange-500 to-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-key text-white text-2xl"></i>
      </div>
      <h1 class="text-2xl font-bold text-gray-800 mb-2">비밀번호 변경</h1>
      <p class="text-gray-600 text-sm">
        <span id="welcome-name" class="font-semibold"></span>님, 안전한 비밀번호로 변경하세요
      </p>
    </div>

    <div class="bg-yellow-50 border-2 border-yellow-300 rounded-xl p-4 mb-6">
      <p class="text-sm text-yellow-800">
        <i class="fas fa-shield-alt mr-2"></i>
        <strong>보안 강화를 위해 비밀번호 변경을 권장합니다.</strong><br>
        현재 기본 비밀번호를 사용 중입니다.
      </p>
    </div>

    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">새 비밀번호</label>
        <input 
          type="password" 
          id="new-password" 
          placeholder="4자리 이상"
          class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-orange-600 transition-colors">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">비밀번호 확인</label>
        <input 
          type="password" 
          id="confirm-password" 
          placeholder="비밀번호 재입력"
          class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-orange-600 transition-colors"
          onkeypress="if(event.key==='Enter') changePassword()">
      </div>

      <div class="flex gap-3">
        <button 
          onclick="skipPasswordChange()" 
          class="flex-1 bg-gray-200 text-gray-700 font-medium py-3 rounded-xl hover:bg-gray-300 transition-colors">
          <i class="fas fa-forward mr-2"></i>다음에 변경
        </button>
        <button 
          onclick="changePassword()" 
          class="flex-1 bg-gradient-to-r from-orange-500 to-red-500 text-white font-bold py-3 rounded-xl hover:from-orange-600 hover:to-red-600 transition-all">
          <i class="fas fa-check mr-2"></i>변경하기
        </button>
      </div>

      <div id="change-error" class="hidden bg-red-50 border-2 border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm">
        <i class="fas fa-exclamation-triangle mr-2"></i>
        <span id="change-error-text"></span>
      </div>
    </div>
  </div>

  <script>
    // Supabase 초기화
    const SUPABASE_URL = 'https://cvvtwdmhtzbclrwtpdry.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2dnR3ZG1odHpiY2xyd3RwZHJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDY5NDk1NzksImV4cCI6MjA2MjUyNTU3OX0.wXLZTRjZvnI7FO2xT1P_RqYXc85g_2OMfkS6T7Goz_M';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentEmployee = null;

    // 비밀번호 보기/숨기기 토글
    function togglePassword() {
      const passwordInput = document.getElementById('emp-password');
      const icon = document.getElementById('password-icon');
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        icon.className = 'fas fa-eye-slash';
      } else {
        passwordInput.type = 'password';
        icon.className = 'fas fa-eye';
      }
    }

    // 에러 메시지 표시
    function showError(message, elementId = 'error-message', textId = 'error-text') {
      document.getElementById(textId).textContent = message;
      document.getElementById(elementId).classList.remove('hidden');
      setTimeout(() => {
        document.getElementById(elementId).classList.add('hidden');
      }, 5000);
    }

    // 로그인
    async function loginEmployee() {
      const name = document.getElementById('emp-name').value.trim();
      const password = document.getElementById('emp-password').value.trim();

      if (!name || !password) {
        showError('이름과 비밀번호를 모두 입력하세요.');
        return;
      }

      try {
        // employees 테이블에서 확인
        const { data, error } = await supabase
          .from('employees')
          .select('*')
          .eq('name', name)
          .eq('login_password', password)
          .eq('is_active', true)
          .single();

        if (error || !data) {
          showError('❌ 이름 또는 비밀번호가 일치하지 않습니다.');
          console.error('Login error:', error);
          return;
        }

        // 로그인 성공
        currentEmployee = data;
        console.log('✅ 로그인 성공:', data.name);

        // 마지막 로그인 시간 업데이트
        await supabase
          .from('employees')
          .update({ last_login_at: new Date().toISOString() })
          .eq('id', data.id);

        // 세션에 저장
        sessionStorage.setItem('payroll_employee_id', data.id);
        sessionStorage.setItem('payroll_employee_name', data.name);

        // 비밀번호 변경 필요 여부 확인
        if (data.force_password_change) {
          document.getElementById('welcome-name').textContent = data.name;
          document.getElementById('login-view').classList.add('hidden');
          document.getElementById('change-password-view').classList.remove('hidden');
        } else {
          // 급여명세서 대시보드로 이동
          window.location.href = 'employee-app.html';
        }

      } catch (err) {
        console.error('Login exception:', err);
        showError('로그인 중 오류가 발생했습니다.');
      }
    }

    // 비밀번호 변경
    async function changePassword() {
      const newPassword = document.getElementById('new-password').value.trim();
      const confirmPassword = document.getElementById('confirm-password').value.trim();

      if (!newPassword || !confirmPassword) {
        showError('모든 필드를 입력하세요.', 'change-error', 'change-error-text');
        return;
      }

      if (newPassword.length < 4) {
        showError('비밀번호는 최소 4자리 이상이어야 합니다.', 'change-error', 'change-error-text');
        return;
      }

      if (newPassword !== confirmPassword) {
        showError('비밀번호가 일치하지 않습니다.', 'change-error', 'change-error-text');
        return;
      }

      try {
        const { error } = await supabase
          .from('employees')
          .update({
            login_password: newPassword,
            password_changed_at: new Date().toISOString(),
            force_password_change: false
          })
          .eq('id', currentEmployee.id);

        if (error) {
          console.error('Password change error:', error);
          showError('비밀번호 변경 중 오류가 발생했습니다.', 'change-error', 'change-error-text');
          return;
        }

        alert('✅ 비밀번호가 변경되었습니다!');
        window.location.href = 'employee-app.html';

      } catch (err) {
        console.error('Password change exception:', err);
        showError('비밀번호 변경 중 오류가 발생했습니다.', 'change-error', 'change-error-text');
      }
    }

    // 비밀번호 변경 건너뛰기
    async function skipPasswordChange() {
      if (confirm('⚠️ 기본 비밀번호는 보안에 취약합니다.\n나중에 변경하시겠습니까?')) {
        // force_password_change 플래그만 해제 (다음에 다시 묻지 않음)
        await supabase
          .from('employees')
          .update({ force_password_change: false })
          .eq('id', currentEmployee.id);

        window.location.href = 'employee-app.html';
      }
    }

    // 세션 확인
    window.addEventListener('load', () => {
      const employeeId = sessionStorage.getItem('payroll_employee_id');
      if (employeeId) {
        window.location.href = 'employee-app.html';
      }
    });
  </script>
</body>
</html>
