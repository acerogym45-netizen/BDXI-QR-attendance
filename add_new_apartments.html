<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새 아파트 7개 추가</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #1b5e3e;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }
        #status {
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 16px;
            line-height: 1.8;
        }
        .loading {
            background: #f0f9ff;
            border: 2px solid #3b82f6;
            color: #1e40af;
        }
        .success {
            background: #f0fdf4;
            border: 2px solid #22c55e;
            color: #166534;
        }
        .error {
            background: #fef2f2;
            border: 2px solid #ef4444;
            color: #991b1b;
        }
        .apartment-list {
            margin-top: 20px;
            padding: 20px;
            background: #f9fafb;
            border-radius: 8px;
        }
        .apartment-item {
            padding: 12px;
            margin: 8px 0;
            background: white;
            border-left: 4px solid #1b5e3e;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .icon {
            font-size: 24px;
        }
        .spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            background: #1b5e3e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #134529;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏢 새로운 아파트 7개 추가</h1>
        
        <div id="status" class="loading">
            <div class="spinner"></div>
            <p style="text-align: center; margin-top: 20px;">아파트 정보를 추가하는 중입니다...</p>
        </div>

        <div class="apartment-list" style="display: none;" id="apartmentList">
            <h3 style="margin-bottom: 16px; color: #1b5e3e;">📋 추가할 아파트 목록</h3>
            <div class="apartment-item">
                <span class="icon">🏢</span>
                <span>e편한세상탕정퍼스트드림</span>
            </div>
            <div class="apartment-item">
                <span class="icon">🏢</span>
                <span>내포이지더원</span>
            </div>
            <div class="apartment-item">
                <span class="icon">🏢</span>
                <span>상도푸르지오클라베뉴</span>
            </div>
            <div class="apartment-item">
                <span class="icon">🏢</span>
                <span>파주디에트르에듀타운</span>
            </div>
            <div class="apartment-item">
                <span class="icon">🏢</span>
                <span>파주호반써밋웨스트파크</span>
            </div>
            <div class="apartment-item">
                <span class="icon">🏢</span>
                <span>헤링턴플레이스안성공도</span>
            </div>
            <div class="apartment-item">
                <span class="icon">🏢</span>
                <span>초월역힐스테이트</span>
            </div>
        </div>

        <button class="btn" onclick="window.location.href='index.html'" style="display: none;" id="backBtn">
            ← 메인 페이지로 돌아가기
        </button>
    </div>

    <script>
        const SUPABASE_URL = 'https://ezyjulsdodriyxuaohmz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6eWp1bHNkb2RyaXl4dWFvaG16Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzU3MjE5NTYsImV4cCI6MjA1MTI5Nzk1Nn0.IzGLnExj7NeZFnGOGjzN7y0RFhPE4VWhxfb5fhqPR4k';
        
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function addApartments() {
            const statusDiv = document.getElementById('status');
            const apartmentListDiv = document.getElementById('apartmentList');
            const backBtn = document.getElementById('backBtn');

            // 먼저 목록 표시
            apartmentListDiv.style.display = 'block';

            const apartments = [
                { name: 'e편한세상탕정퍼스트드림' },
                { name: '내포이지더원' },
                { name: '상도푸르지오클라베뉴' },
                { name: '파주디에트르에듀타운' },
                { name: '파주호반써밋웨스트파크' },
                { name: '헤링턴플레이스안성공도' },
                { name: '초월역힐스테이트' }
            ];

            try {
                console.log('🚀 Supabase에 아파트 추가 시작...');
                console.log('추가할 아파트:', apartments);

                const { data, error } = await supabaseClient
                    .from('apartments')
                    .insert(apartments)
                    .select();

                if (error) {
                    console.error('❌ Supabase 오류:', error);
                    statusDiv.className = 'error';
                    statusDiv.innerHTML = `
                        <h2 style="margin-top: 0;">❌ 추가 실패</h2>
                        <p><strong>오류 메시지:</strong> ${error.message}</p>
                        <p><strong>오류 코드:</strong> ${error.code || 'N/A'}</p>
                        <details style="margin-top: 16px;">
                            <summary style="cursor: pointer; font-weight: bold;">상세 오류 정보 보기</summary>
                            <pre style="background: #f9fafb; padding: 12px; border-radius: 4px; overflow-x: auto; margin-top: 8px;">${JSON.stringify(error, null, 2)}</pre>
                        </details>
                        ${error.message.includes('duplicate') || error.message.includes('unique') ? 
                            '<p style="margin-top: 16px; padding: 12px; background: #fef3c7; border-left: 4px solid #f59e0b; border-radius: 4px;"><strong>💡 힌트:</strong> 이미 동일한 이름의 아파트가 존재합니다. 중복 체크를 해주세요.</p>' : ''}
                    `;
                } else {
                    console.log('✅ 성공:', data);
                    statusDiv.className = 'success';
                    statusDiv.innerHTML = `
                        <h2 style="margin-top: 0;">✅ 추가 성공!</h2>
                        <p><strong>${data.length}개</strong>의 아파트가 성공적으로 추가되었습니다.</p>
                        <div style="margin-top: 20px; padding: 16px; background: white; border-radius: 8px;">
                            ${data.map((apt, idx) => `
                                <div style="padding: 8px 0; border-bottom: 1px solid #e5e7eb;">
                                    <strong>${idx + 1}. ${apt.name}</strong>
                                    <span style="color: #6b7280; font-size: 14px; margin-left: 12px;">ID: ${apt.id}</span>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }

                backBtn.style.display = 'block';

            } catch (err) {
                console.error('❌ 예외 발생:', err);
                statusDiv.className = 'error';
                statusDiv.innerHTML = `
                    <h2 style="margin-top: 0;">❌ 예외 발생</h2>
                    <p>${err.message}</p>
                    <pre style="background: #f9fafb; padding: 12px; border-radius: 4px; overflow-x: auto; margin-top: 12px;">${err.stack}</pre>
                `;
                backBtn.style.display = 'block';
            }
        }

        // 페이지 로드 시 자동 실행
        window.addEventListener('DOMContentLoaded', () => {
            console.log('페이지 로드 완료. 아파트 추가 시작...');
            setTimeout(addApartments, 500); // 0.5초 후 실행
        });
    </script>
</body>
</html>
