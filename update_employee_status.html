<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>직원 상태 업데이트 - 관리자</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .employee-card {
            background: #f8f9fa;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .employee-name {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        
        .employee-info {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .employee-info label {
            font-weight: 600;
            color: #666;
        }
        
        .employee-info span {
            color: #333;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-active {
            background: #28a745;
            color: white;
        }
        
        .status-inactive {
            background: #dc3545;
            color: white;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }
        
        .btn-deactivate {
            background: #dc3545;
            color: white;
        }
        
        .btn-deactivate:hover {
            background: #c82333;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.3);
        }
        
        .btn-activate {
            background: #28a745;
            color: white;
        }
        
        .btn-activate:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .message {
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-weight: 500;
        }
        
        .message-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 직원 상태 업데이트</h1>
        <p class="subtitle">직원의 활성화 상태를 변경할 수 있습니다</p>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>강은서 직원 정보를 불러오는 중...</p>
        </div>
        
        <div id="employeeCard" style="display: none;">
            <div class="employee-card">
                <div class="employee-name" id="employeeName">-</div>
                
                <div class="employee-info">
                    <label>직책:</label>
                    <span id="employeePosition">-</span>
                    
                    <label>소속 아파트:</label>
                    <span id="employeeApartment">-</span>
                    
                    <label>계약 종료일:</label>
                    <span id="employeeContract">-</span>
                    
                    <label>현재 상태:</label>
                    <span id="employeeStatus">-</span>
                </div>
                
                <button id="btnToggleStatus" class="btn" onclick="toggleStatus()">
                    상태 변경
                </button>
            </div>
        </div>
        
        <div id="message" style="display: none;"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yekllpezefxwnwnqxitj.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlla2xscGV6ZWZ4d253bnF4aXRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzM5MjE1MTUsImV4cCI6MjA0OTQ5NzUxNX0.Q-zIyOjj-kFpJlZDhQ2oM1mA_D_Z7m7Yniz2vMKC22s';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let employeeData = null;
        
        async function loadEmployeeData() {
            try {
                const { data, error } = await supabaseClient
                    .from('employees')
                    .select(`
                        *,
                        apartments (name)
                    `)
                    .eq('name', '강은서')
                    .single();
                
                if (error) {
                    showMessage('강은서 직원을 찾을 수 없습니다: ' + error.message, 'error');
                    return;
                }
                
                employeeData = data;
                displayEmployeeData(data);
                
            } catch (error) {
                console.error('데이터 로드 실패:', error);
                showMessage('데이터 로드 중 오류가 발생했습니다', 'error');
            }
        }
        
        function displayEmployeeData(data) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('employeeCard').style.display = 'block';
            
            document.getElementById('employeeName').textContent = data.name || '-';
            document.getElementById('employeePosition').textContent = data.position || '-';
            document.getElementById('employeeApartment').textContent = data.apartments?.name || '-';
            document.getElementById('employeeContract').textContent = data.contract_end || '-';
            
            const statusBadge = data.is_active 
                ? '<span class="status-badge status-active">활성 (근무중)</span>'
                : '<span class="status-badge status-inactive">비활성 (퇴사)</span>';
            
            document.getElementById('employeeStatus').innerHTML = statusBadge;
            
            const btn = document.getElementById('btnToggleStatus');
            if (data.is_active) {
                btn.textContent = '❌ 비활성화 (퇴사 처리)';
                btn.className = 'btn btn-deactivate';
            } else {
                btn.textContent = '✅ 활성화 (복직 처리)';
                btn.className = 'btn btn-activate';
            }
        }
        
        async function toggleStatus() {
            if (!employeeData) return;
            
            const newStatus = !employeeData.is_active;
            const statusText = newStatus ? '활성화' : '비활성화';
            
            if (!confirm(`정말로 강은서 직원을 ${statusText} 처리하시겠습니까?`)) {
                return;
            }
            
            const btn = document.getElementById('btnToggleStatus');
            btn.disabled = true;
            btn.textContent = '처리 중...';
            
            try {
                const { data, error } = await supabaseClient
                    .from('employees')
                    .update({ is_active: newStatus })
                    .eq('id', employeeData.id)
                    .select()
                    .single();
                
                if (error) {
                    throw error;
                }
                
                employeeData = data;
                displayEmployeeData(data);
                showMessage(`✅ 강은서 직원이 ${statusText} 되었습니다`, 'success');
                
            } catch (error) {
                console.error('상태 변경 실패:', error);
                showMessage('상태 변경 중 오류가 발생했습니다: ' + error.message, 'error');
                btn.disabled = false;
            }
        }
        
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = 'message message-' + type;
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }
        
        // 페이지 로드 시 데이터 로드
        window.addEventListener('DOMContentLoaded', loadEmployeeData);
    </script>
</body>
</html>
