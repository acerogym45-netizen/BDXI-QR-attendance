                <span class="font-medium">${purchase.purchase_items.map(i => i.item_name).join(', ')}</span>
              </div>
              <div class="flex justify-between">
                <span class="text-gray-600">요청일:</span>
                <span class="font-medium">${new Date(purchase.created_at).toLocaleDateString('ko-KR')}</span>
              </div>
              <div class="flex justify-between">
                <span class="text-gray-600">예상 금액:</span>
                <span class="font-medium text-indigo-600">₩${parseFloat(purchase.total_amount).toLocaleString('ko-KR')}</span>
              </div>
            `;
            
            // 입력 필드 초기화
            document.getElementById('inspection-photos').value = '';
            document.getElementById('inspection-photo-preview').innerHTML = '';
            document.getElementById('inspection-actual-amount').value = '';
            document.getElementById('inspection-notes').value = '';
            
            // 사진 선택 이벤트
            document.getElementById('inspection-photos').onchange = (e) => {
              const files = Array.from(e.target.files).slice(0, 5);
              const preview = document.getElementById('inspection-photo-preview');
              preview.innerHTML = '';
              
              files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                  preview.insertAdjacentHTML('beforeend', `
                    <img src="${e.target.result}" class="w-full h-24 object-cover rounded-lg border-2 border-green-300">
                  `);
                };
                reader.readAsDataURL(file);
              });
            };
            
            // 모달 열기
            document.getElementById('inspection-modal').classList.remove('hidden');
          } catch (err) {
            console.error('❌ 검수 모달 열기 실패:', err);
            this.showToast('❌ 오류가 발생했습니다', 'error');
          }
        },

        // 검수 모달 닫기
        closeInspectionModal: function () {
          document.getElementById('inspection-modal').classList.add('hidden');
        },

        // 검수 완료 제출
        submitInspection: async function () {
          const files = document.getElementById('inspection-photos').files;
          const actualAmount = parseFloat(document.getElementById('inspection-actual-amount').value);
          const notes = document.getElementById('inspection-notes').value;
          
          // 유효성 검사
          if (files.length === 0) {
            this.showToast('⚠️ 사진을 업로드하세요', 'warning');
            return;
          }
          
          if (!actualAmount || actualAmount <= 0) {
            this.showToast('⚠️ 실제 금액을 입력하세요', 'warning');
            return;
          }
          
          try {
            this.showToast('📤 검수 정보를 업로드하는 중...', 'info');
            
            // 사진 업로드
            const photoUrls = [];
            for (let i = 0; i < files.length; i++) {
              const file = files[i];
              const fileName = `${this.state.currentInspection.id}_${Date.now()}_${i}.jpg`;
              
              const { data, error } = await this.sb.storage
                .from('purchase-photos')
                .upload(fileName, file);
              
              if (error) throw error;
              
              const { data: urlData } = this.sb.storage
                .from('purchase-photos')
                .getPublicUrl(fileName);
              
              photoUrls.push(urlData.publicUrl);
            }
            
            // 사진 정보 저장
            const photoRecords = photoUrls.map(url => ({
              purchase_id: this.state.currentInspection.id,
              photo_url: url,
              uploaded_by: this.state.selectedEmp.name
            }));
            
            const { error: e1 } = await this.sb
              .from('purchase_photos')
              .insert(photoRecords);
            
            if (e1) throw e1;
            
            // 구매 요청 완료 처리
            const { error: e2 } = await this.sb
              .from('purchases')
              .update({
                status: 'completed',
                completion_time: new Date().toISOString(),
                actual_amount: actualAmount,
                inspected_by: this.state.selectedEmp.name,
                inspected_at: new Date().toISOString(),
                inspection_notes: notes || null
              })
              .eq('id', this.state.currentInspection.id);
            
            if (e2) throw e2;
            
            this.showToast('✅ 검수가 완료되었습니다!', 'success');
            this.closeInspectionModal();
            
            // 배지 업데이트
            await this.loadPurchaseBadge();
            
            // 구매 요청 모달이 열려있으면 목록 새로고침
            const purchaseModal = document.getElementById('purchase-modal');
            if (purchaseModal && !purchaseModal.classList.contains('hidden')) {
              await this.loadMyPurchases();
            }
          } catch (err) {
            console.error('❌ 검수 완료 처리 실패:', err);
            this.showToast('❌ 검수 처리 중 오류가 발생했습니다', 'error');
          }
        },

        // 🆕 ========== 새 구매 요청 기능 ==========
        
        // 새 구매 요청 모달 열기
        openNewPurchaseRequest: function () {
          // 초기화
          document.getElementById('new-purchase-reason').value = '';
          document.getElementById('new-purchase-items').innerHTML = '';
          document.getElementById('new-purchase-total').textContent = '₩0';
          
          // 초기 물품 1개 추가
          this.state.newPurchaseItemCounter = 0;
          this.addPurchaseItemRow();
          
          // 모달 열기
          document.getElementById('new-purchase-modal').classList.remove('hidden');
        },

        // 새 구매 요청 모달 닫기
        closeNewPurchaseModal: function () {
          document.getElementById('new-purchase-modal').classList.add('hidden');
        },

        // 물품 항목 추가
        addPurchaseItemRow: function () {
          const itemId = ++this.state.newPurchaseItemCounter;
          const container = document.getElementById('new-purchase-items');
          
          const itemHtml = `
            <div id="item-${itemId}" class="bg-gray-50 border border-gray-200 rounded-lg p-3">
              <div class="flex justify-between items-start mb-2">
                <span class="text-xs font-medium text-gray-600">물품 #${itemId}</span>
                ${itemId > 1 ? `<button onclick="app.removePurchaseItemRow(${itemId})" class="text-red-500 hover:text-red-700 text-xs"><i class="fas fa-times"></i></button>` : ''}
              </div>
              <div class="space-y-2">
                <input type="text" id="item-name-${itemId}" placeholder="물품명" class="w-full px-3 py-2 text-sm border rounded-lg focus:ring-2 focus:ring-blue-500" required onchange="app.calculateNewPurchaseTotal()">
                <div class="grid grid-cols-2 gap-2">
                  <input type="number" id="item-quantity-${itemId}" placeholder="수량" class="w-full px-3 py-2 text-sm border rounded-lg focus:ring-2 focus:ring-blue-500" value="1" min="1" required onchange="app.calculateNewPurchaseTotal()">
                  <input type="number" id="item-price-${itemId}" placeholder="단가" class="w-full px-3 py-2 text-sm border rounded-lg focus:ring-2 focus:ring-blue-500" min="0" required onchange="app.calculateNewPurchaseTotal()">
                </div>
                <select id="item-category-${itemId}" class="w-full px-3 py-2 text-sm border rounded-lg focus:ring-2 focus:ring-blue-500">
                  <option value="">카테고리 선택</option>
                  <option value="청소용품">청소용품</option>
                  <option value="운동기구">운동기구</option>
                  <option value="사무용품">사무용품</option>
                  <option value="소모품">소모품</option>
                  <option value="기타">기타</option>
                </select>
              </div>
            </div>
          `;
          
          container.insertAdjacentHTML('beforeend', itemHtml);
        },

        // 물품 항목 제거
        removePurchaseItemRow: function (itemId) {
          const item = document.getElementById(`item-${itemId}`);
          if (item) {
            item.remove();
            this.calculateNewPurchaseTotal();
          }
        },

        // 총 금액 계산
        calculateNewPurchaseTotal: function () {
          let total = 0;
          const items = document.querySelectorAll('#new-purchase-items > div');
          
          items.forEach(item => {
            const id = item.id.replace('item-', '');
            const quantity = parseFloat(document.getElementById(`item-quantity-${id}`)?.value || 0);
            const price = parseFloat(document.getElementById(`item-price-${id}`)?.value || 0);
            total += quantity * price;
          });
          
          document.getElementById('new-purchase-total').textContent = '₩' + total.toLocaleString('ko-KR');
        },

        // 새 구매 요청 제출
        submitNewPurchaseRequest: async function () {
          const reason = document.getElementById('new-purchase-reason').value.trim();
          
          if (!reason) {
            this.showToast('⚠️ 구매 사유를 입력하세요', 'warning');
            return;
          }
          
          // 물품 수집
          const items = [];
          const itemDivs = document.querySelectorAll('#new-purchase-items > div');
          
          for (let itemDiv of itemDivs) {
            const id = itemDiv.id.replace('item-', '');
            const name = document.getElementById(`item-name-${id}`)?.value.trim();
            const quantity = parseInt(document.getElementById(`item-quantity-${id}`)?.value || 0);
            const price = parseFloat(document.getElementById(`item-price-${id}`)?.value || 0);
            const category = document.getElementById(`item-category-${id}`)?.value || '기타';
            
            if (!name) {
              this.showToast('⚠️ 물품명을 입력하세요', 'warning');
              return;
            }
            
            if (quantity <= 0 || price < 0) {
              this.showToast('⚠️ 수량과 단가를 정확히 입력하세요', 'warning');
              return;
            }
            
            items.push({
              item_name: name,
              quantity: quantity,
              unit_price: price,
              category: category
            });
          }
          
          if (items.length === 0) {
            this.showToast('⚠️ 최소 1개 이상의 물품을 추가하세요', 'warning');
            return;
          }
          
          const totalAmount = items.reduce((sum, item) => sum + (item.quantity * item.unit_price), 0);
          
          try {
            this.showToast('📤 구매 요청을 제출하는 중...', 'info');
            
            const requestData = {
              apartment_id: this.state.aptId,
              requester_name: this.state.selectedEmp.name,
              requester_employee_id: this.state.selectedEmp.id,
              requester_role: this.state.selectedEmp.position || '직원',
              reason: reason,
              total_amount: totalAmount,
              status: 'pending'
            };
            
            console.log('🔍 [1/4] 구매 요청 데이터 준비:', requestData);
            console.log('🔍 [2/4] 물품 목록:', items);
            
            // 구매 요청 생성
            console.log('🔍 [3/4] Supabase에 INSERT 시도...');
            const insertResult = await this.sb
              .from('purchases')
              .insert(requestData)
              .select()
              .single();
            
            console.log('🔍 [3/4] Supabase 응답:', insertResult);
            
            if (insertResult.error) {
              console.error('❌ [3/4] INSERT 실패:', insertResult.error);
              throw insertResult.error;
            }
            
            const purchase = insertResult.data;
            console.log('✅ [3/4] 구매 요청 생성 성공:', purchase);
            
            // 물품 항목 추가
            const itemRecords = items.map(item => ({
              purchase_id: purchase.id,
              ...item
            }));
            
            console.log('🔍 [4/4] 물품 항목 INSERT 시도...', itemRecords);
            const itemsResult = await this.sb
              .from('purchase_items')
              .insert(itemRecords);
            
            console.log('🔍 [4/4] 물품 항목 응답:', itemsResult);
            
            if (itemsResult.error) {
              console.error('❌ [4/4] 물품 항목 INSERT 실패:', itemsResult.error);
              throw itemsResult.error;
            }
            
            console.log('✅ [4/4] 물품 항목 생성 성공');
            console.log('✅ 전체 구매 요청 제출 완료!');
            this.showToast('✅ 구매 요청이 제출되었습니다!', 'success');
            this.closeNewPurchaseModal();
            
            // 배지만 업데이트 (모달이 열려있으면 목록도 새로고침)
            await this.loadPurchaseBadge();
            
            // 구매 요청 모달이 열려있으면 목록 새로고침
            const purchaseModal = document.getElementById('purchase-modal');
            if (purchaseModal && !purchaseModal.classList.contains('hidden')) {
              await this.loadMyPurchases();
            }
          } catch (err) {
            console.error('❌ 구매 요청 제출 실패:', err);
            console.error('📋 에러 타입:', typeof err);
            console.error('📋 에러 객체:', err);
            console.error('📋 에러 상세:', {
              message: err.message,
              code: err.code,
              details: err.details,
              hint: err.hint,
              status: err.status,
              statusCode: err.statusCode
            });
            
            // 에러 메시지 분석
            let errorMsg = '❌ 구매 요청 제출 중 오류가 발생했습니다';
            if (err.code === '42501') {
              errorMsg = '❌ 권한 오류: 데이터베이스 접근 권한이 없습니다';
            } else if (err.code === '42703') {
              errorMsg = '❌ 스키마 오류: 데이터베이스 컬럼이 존재하지 않습니다';
            } else if (err.code === '23505') {
              errorMsg = '❌ 중복 오류: 이미 존재하는 데이터입니다';
            } else if (err.message) {
              errorMsg = `❌ ${err.message}`;
            }
            
            this.showToast(errorMsg, 'error');
          }
        },

        // 🔍 자동 진단 함수
        diagnoseBlockingSystem: async function () {
          console.log('🔍 ========== 차단 시스템 자동 진단 시작 ==========');
          
          try {
            // 1️⃣ 현재 선택된 직원 정보
            if (!this.state.selectedEmp) {
              console.error('❌ 직원을 먼저 선택해주세요!');
              return;
            }
            
            console.log('1️⃣ 선택된 직원 정보:', {
              name: this.state.selectedEmp.name,
              id: this.state.selectedEmp.id,
              apartment_id: this.state.aptId
            });

            // 2️⃣ 직원의 최근 7일 출퇴근 기록 확인
            console.log('\n2️⃣ 최근 7일 출퇴근 기록 조회 중...');
            const { data: records, error: recordsError } = await this.sb
              .from('attendance_records')
              .select('employee_name, employee_id, attendance_type, scan_time')
              .eq('employee_name', this.state.selectedEmp.name)
              .gte('scan_time', new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString())
              .order('scan_time', { ascending: false });

            if (recordsError) {
              console.error('❌ 기록 조회 실패:', recordsError);
            } else {
              console.log(`✅ 총 ${records.length}건의 기록 발견`);
              console.table(records.map(r => ({
                날짜: new Date(r.scan_time).toLocaleDateString('ko-KR'),
                시간: new Date(r.scan_time).toLocaleTimeString('ko-KR'),
                타입: r.attendance_type,
                employee_id: r.employee_id
              })));
            }

            // 3️⃣ employee_id 타입 확인
            console.log('\n3️⃣ employee_id 타입 확인');
            if (records && records.length > 0) {
              const sampleId = records[0].employee_id;
              console.log('샘플 employee_id:', sampleId);
              console.log('타입:', typeof sampleId);
              console.log('길이:', sampleId ? sampleId.length : 'null');
              console.log('선택된 직원 ID와 일치:', sampleId === this.state.selectedEmp.id);
            }

            // 4️⃣ 미완료 퇴근 기록 확인 (수동 계산)
            console.log('\n4️⃣ 미완료 퇴근 기록 확인 (오늘 제외)');
            if (records) {
              const today = new Date().toDateString();
              const byDate = {};
              
              records.forEach(r => {
                const date = new Date(r.scan_time).toDateString();
                if (date === today) return; // 오늘 제외
                
                if (!byDate[date]) byDate[date] = { 출근: [], 퇴근: [] };
                byDate[date][r.attendance_type].push(r);
              });

              const incomplete = [];
              Object.keys(byDate).forEach(date => {
                const checkIns = byDate[date]['출근'] || [];
                const checkOuts = byDate[date]['퇴근'] || [];
                
                if (checkIns.length > checkOuts.length) {
                  incomplete.push({
                    날짜: date,
                    출근_횟수: checkIns.length,
                    퇴근_횟수: checkOuts.length,
                    미완료_건수: checkIns.length - checkOuts.length
                  });
                }
              });

              if (incomplete.length > 0) {
                console.log('🚫 미완료 퇴근 발견!');
                console.table(incomplete);
              } else {
                console.log('✅ 미완료 퇴근 없음');
              }
            }

            // 5️⃣ validate_check_in RPC 함수 호출
            console.log('\n5️⃣ validate_check_in RPC 함수 호출');
            console.log('파라미터:', {
              apartment_id_param: this.state.aptId,
              employee_id_param: this.state.selectedEmp.id
            });

            const { data: validationResult, error: validationError } = await this.sb
              .rpc('validate_check_in', {
                apartment_id_param: this.state.aptId,
                employee_id_param: this.state.selectedEmp.id
              });

            if (validationError) {
              console.error('❌ RPC 함수 호출 실패:', validationError);
              console.error('에러 상세:', JSON.stringify(validationError, null, 2));
            } else {
              console.log('✅ RPC 함수 호출 성공!');
              console.log('결과:', JSON.stringify(validationResult, null, 2));
              
              if (validationResult.blocked) {
                console.log('🚫 차단됨!');
                console.log(`미완료 건수: ${validationResult.incomplete_count}`);
                console.table(validationResult.incomplete_records);
              } else {
                console.log('✅ 차단 안됨 - 정상 출근 가능');
              }
            }

            console.log('\n🔍 ========== 진단 완료 ==========');
            console.log('위 정보를 개발자에게 전달하면 문제를 해결할 수 있습니다.');

          } catch (error) {
            console.error('❌ 진단 중 오류 발생:', error);
          }
        },
      };

      // 전역에 진단 함수 노출
      window.diagnoseAttendance = () => app.diagnoseBlockingSystem();

      document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
