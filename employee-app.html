  <style>
    /* 커스텀 애니메이션 */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .animate-fade-in {
      animation: fadeIn 0.3s ease-out;
    }
    
    .animate-pulse-slow {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    
    /* PWA 설치 배너 */
    .install-prompt {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 1rem;
      box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.1);
      z-index: 9999;
      transform: translateY(100%);
      transition: transform 0.3s ease-out;
    }
    
    .install-prompt.show {
      transform: translateY(0);
    }
    
    /* GPS 상태 표시 */
    .gps-indicator {
      position: fixed;
      top: 1rem;
      right: 1rem;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      z-index: 1000;
    }
    
    .gps-indicator.active {
      background-color: #10b981;
      box-shadow: 0 0 0 0 rgba(16, 185, 129, 1);
      animation: pulse 2s infinite;
    }
    
    .gps-indicator.inactive {
      background-color: #ef4444;
    }
    
    /* 터치 피드백 */
    .btn-touch {
      transition: transform 0.1s ease;
    }
    
    .btn-touch:active {
      transform: scale(0.95);
    }
  </style>
</head>

  <!-- 모달들 (구매 요청, 검수 등) - scan.html에서 가져올 예정 -->
  
  <script>
    // ==============================================
    // BDXI 직원 PWA 앱 v2.0
    // GPS 위치 기반 인증 시스템
    // ==============================================
    
    const SUPABASE_URL = 'https://qgpqhtuynxhmgawakjxe.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFncHFodHV5bnhobWdhd2FramplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzQwMTY4NTQsImV4cCI6MjA0OTU5Mjg1NH0.zQGr_rbuF-iNfm1PpBcjdSoOxG1_wljOE6dOVxrzl9k';
    
    const app = {
      sb: null,
      state: {
        employee: null,
        workplace: null,
        currentLocation: null,
        deviceFingerprint: null,
        beforePhoto: null,
        afterPhoto: null,
        selectedPhotos: [],
        currentTab: 'attendance'
      },
      
      // ==================== 초기화 ====================
      async init() {
        console.log('🚀 BDXI 직원 앱 초기화 시작...');
        
        try {
          // Supabase 클라이언트 생성
          this.sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
          
          // PWA 설치 프롬프트 설정
          this.setupPWAInstall();
          
          // Service Worker 등록
          await this.registerServiceWorker();
          
          // 기기 인증
          await this.authenticateDevice();
          
          // 직원 정보 로드
          await this.loadEmployee();
          
          // 근무지 정보 로드
          await this.loadWorkplace();
          
          // 위치 권한 요청 및 GPS 시작
          await this.startGPSTracking();
          
          // 이벤트 리스너 설정
          this.setupEventListeners();
          
          // UI 렌더링
          this.renderUI();
          
          // 로딩 화면 숨기기
          document.getElementById('loading-screen').classList.add('hidden');
          document.getElementById('main-container').classList.remove('hidden');
          
          console.log('✅ 앱 초기화 완료!');
          this.showToast('환영합니다! 👋', 'success');
          
        } catch (error) {
          console.error('❌ 앱 초기화 실패:', error);
          alert('앱을 시작할 수 없습니다.\n' + error.message);
        }
      },
      
      // ==================== PWA 설치 ====================
      setupPWAInstall() {
        let deferredPrompt;
        
        window.addEventListener('beforeinstallprompt', (e) => {
          e.preventDefault();
          deferredPrompt = e;
          
          // 설치 배너 표시
          const installPrompt = document.getElementById('install-prompt');
          setTimeout(() => {
            installPrompt.classList.add('show');
          }, 3000);
        });
        
        document.getElementById('install-btn').addEventListener('click', async () => {
          if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log(`PWA 설치: ${outcome}`);
            deferredPrompt = null;
          }
          document.getElementById('install-prompt').classList.remove('show');
        });
        
        document.getElementById('install-close').addEventListener('click', () => {
          document.getElementById('install-prompt').classList.remove('show');
        });
      },
      
      // ==================== Service Worker ====================
      async registerServiceWorker() {
        if ('serviceWorker' in navigator) {
          try {
            const registration = await navigator.serviceWorker.register('/service-worker.js');
            console.log('✅ Service Worker 등록 완료:', registration.scope);
          } catch (error) {
            console.error('❌ Service Worker 등록 실패:', error);
          }
        }
      },
      
      // ==================== 기기 인증 ====================
      async authenticateDevice() {
        // 브라우저 지문 생성 (간단 버전)
        const fingerprint = await this.generateFingerprint();
        this.state.deviceFingerprint = fingerprint;
        
        console.log('🔑 기기 지문:', fingerprint.substring(0, 16) + '...');
        
        // 로컬 스토리지에서 직원 토큰 확인
        const savedToken = localStorage.getItem('employee_token');
        const savedEmployeeId = localStorage.getItem('employee_id');
        
        if (savedToken && savedEmployeeId) {
          console.log('✅ 저장된 인증 정보 발견');
          return { token: savedToken, employeeId: savedEmployeeId };
        }
        
        return null;
      },
      
      async generateFingerprint() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        ctx.textBaseline = 'top';
        ctx.font = '14px Arial';
        ctx.fillText('fingerprint', 2, 2);
        const canvasData = canvas.toDataURL();
        
        const data = [
          navigator.userAgent,
          navigator.language,
          screen.width + 'x' + screen.height,
          new Date().getTimezoneOffset(),
          canvasData
        ].join('|');
        
        // 간단한 해시 생성
        let hash = 0;
        for (let i = 0; i < data.length; i++) {
          const char = data.charCodeAt(i);
          hash = ((hash << 5) - hash) + char;
          hash = hash & hash;
        }
        
        return 'fp_' + Math.abs(hash).toString(36) + '_' + Date.now();
      },
      
      // ==================== 직원 정보 로드 ====================
      async loadEmployee() {
        const savedEmployeeId = localStorage.getItem('employee_id');
        
        if (!savedEmployeeId) {
          // 직원 선택 필요
          await this.showEmployeeSelector();
          return;
        }
        
        // DB에서 직원 정보 조회
        const { data, error } = await this.sb
          .from('employees')
          .select('*')
          .eq('id', savedEmployeeId)
          .single();
        
        if (error || !data) {
          console.error('직원 정보 로드 실패:', error);
          localStorage.removeItem('employee_id');
          await this.showEmployeeSelector();
          return;
        }
        
        this.state.employee = data;
        console.log('✅ 직원 정보 로드:', data.name);
        
        // 마지막 로그인 시간 업데이트
        await this.sb
          .from('employees')
          .update({
            device_fingerprint: this.state.deviceFingerprint,
            last_login_at: new Date().toISOString()
          })
          .eq('id', savedEmployeeId);
      },
      
      // ==================== 직원 선택 UI ====================
      async showEmployeeSelector() {
        // 간단한 프롬프트로 직원 이름 입력 (임시)
        const name = prompt('직원 이름을 입력하세요:');
        if (!name) {
          alert('직원 이름이 필요합니다.');
          location.reload();
          return;
        }
        
        // DB에서 직원 검색
        const { data, error } = await this.sb
          .from('employees')
          .select('*')
          .ilike('name', `%${name}%`)
          .limit(10);
        
        if (error || !data || data.length === 0) {
          alert('직원을 찾을 수 없습니다.');
          location.reload();
          return;
        }
        
        // 여러 명이면 선택
        let selected = data[0];
        if (data.length > 1) {
          const names = data.map((e, i) => `${i + 1}. ${e.name} (${e.position || '직원'})`).join('\n');
          const choice = parseInt(prompt(`여러 명이 검색되었습니다. 번호를 선택하세요:\n${names}`));
          if (choice && choice > 0 && choice <= data.length) {
            selected = data[choice - 1];
          }
        }
        
        this.state.employee = selected;
        localStorage.setItem('employee_id', selected.id);
        
        console.log('✅ 직원 선택:', selected.name);
      },
      
      // ==================== 근무지 정보 로드 ====================
      async loadWorkplace() {
        if (!this.state.employee || !this.state.employee.apartment_id) {
          console.error('❌ 직원의 단지 정보가 없습니다');
          return;
        }
        
        const { data, error } = await this.sb
          .from('apartments')
          .select('*')
          .eq('id', this.state.employee.apartment_id)
          .single();
        
        if (error || !data) {
          console.error('근무지 정보 로드 실패:', error);
          return;
        }
        
        this.state.workplace = data;
        console.log('✅ 근무지 정보 로드:', data.name);
        console.log('📍 허용 반경:', data.allowed_radius_meters, 'm');
      },
      
      // ==================== GPS 추적 시작 ====================
      async startGPSTracking() {
        if (!('geolocation' in navigator)) {
          alert('이 기기는 위치 서비스를 지원하지 않습니다.');
          return;
        }
        
        try {
          // 위치 권한 요청
          const permission = await navigator.permissions.query({ name: 'geolocation' });
          console.log('위치 권한 상태:', permission.state);
          
          // 실시간 위치 추적
          this.watchGPS();
          
        } catch (error) {
          console.error('GPS 추적 시작 실패:', error);
        }
      },
      
      watchGPS() {
        const options = {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        };
        
        navigator.geolocation.watchPosition(
          (position) => {
            this.state.currentLocation = {
              lat: position.coords.latitude,
              lng: position.coords.longitude,
              accuracy: position.coords.accuracy,
              timestamp: new Date(position.timestamp)
            };
            
            // GPS 인디케이터 활성화
            document.getElementById('gps-indicator').classList.remove('inactive');
            document.getElementById('gps-indicator').classList.add('active');
            
            // 위치 정보 업데이트
            this.updateLocationInfo();
          },
          (error) => {
            console.error('GPS 오류:', error);
            document.getElementById('gps-indicator').classList.remove('active');
            document.getElementById('gps-indicator').classList.add('inactive');
            
            this.showLocationError(error);
          },
          options
        );
      },
      
      updateLocationInfo() {
        if (!this.state.currentLocation || !this.state.workplace) return;
        
        const distance = this.calculateDistance(
          this.state.currentLocation.lat,
          this.state.currentLocation.lng,
          this.state.workplace.location_lat,
          this.state.workplace.location_lng
        );
        
        const accuracy = Math.round(this.state.currentLocation.accuracy);
        const distanceRounded = Math.round(distance);
        const allowedRadius = this.state.workplace.allowed_radius_meters;
        
        let statusHTML = '';
        let statusColor = '';
        
        if (distance <= allowedRadius) {
          statusColor = 'text-green-600';
          statusHTML = `
            <div class="flex items-center gap-2 ${statusColor}">
              <i class="fas fa-check-circle"></i>
              <span class="font-bold">근무지 범위 내 ✓</span>
            </div>
            <div class="text-sm text-gray-600 mt-2">
              📍 거리: ${distanceRounded}m / ${allowedRadius}m<br>
              🎯 정확도: ±${accuracy}m
            </div>
          `;
        } else {
          statusColor = 'text-orange-600';
          statusHTML = `
            <div class="flex items-center gap-2 ${statusColor}">
              <i class="fas fa-exclamation-triangle"></i>
              <span class="font-bold">근무지 범위 밖 ⚠️</span>
            </div>
            <div class="text-sm text-gray-600 mt-2">
              📍 거리: ${distanceRounded}m / ${allowedRadius}m<br>
              🎯 정확도: ±${accuracy}m<br>
              <span class="text-orange-600">ℹ️ 출퇴근 기록은 ${allowedRadius}m 이내에서만 가능합니다</span>
            </div>
          `;
        }
        
        document.getElementById('location-info').innerHTML = statusHTML;
        document.getElementById('header-location').textContent = 
          `📍 ${this.state.workplace.name} (${distanceRounded}m)`;
      },
      
      showLocationError(error) {
        let message = 'GPS 위치를 가져올 수 없습니다';
        
        switch (error.code) {
          case error.PERMISSION_DENIED:
            message = '위치 권한이 거부되었습니다. 설정에서 권한을 허용해주세요.';
            break;
          case error.POSITION_UNAVAILABLE:
            message = 'GPS 신호를 받을 수 없습니다. 야외로 나가주세요.';
            break;
          case error.TIMEOUT:
            message = 'GPS 위치를 가져오는데 시간이 너무 오래 걸립니다.';
            break;
        }
        
        document.getElementById('location-info').innerHTML = `
          <div class="flex items-center gap-2 text-red-600">
            <i class="fas fa-exclamation-circle"></i>
            <span>${message}</span>
          </div>
        `;
      },
      
      // ==================== 거리 계산 (Haversine) ====================
      calculateDistance(lat1, lng1, lat2, lng2) {
        const R = 6371e3; // 지구 반경 (미터)
        const φ1 = lat1 * Math.PI / 180;
        const φ2 = lat2 * Math.PI / 180;
        const Δφ = (lat2 - lat1) * Math.PI / 180;
        const Δλ = (lng2 - lng1) * Math.PI / 180;

        const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                  Math.cos(φ1) * Math.cos(φ2) *
                  Math.sin(Δλ/2) * Math.sin(Δλ/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

        return R * c; // 미터
      },
      
      // ==================== 위치 검증 ====================
      async verifyLocation(requiredAction = '출퇴근') {
        if (!this.state.currentLocation) {
          throw new Error('GPS 위치를 가져오는 중입니다. 잠시 후 다시 시도해주세요.');
        }
        
        if (!this.state.workplace) {
          throw new Error('근무지 정보를 찾을 수 없습니다.');
        }
        
        const accuracy = this.state.currentLocation.accuracy;
        const allowedRadius = this.state.workplace.allowed_radius_meters;
        
        // 정확도 체크
        if (accuracy > 100) {
          throw new Error(
            `GPS 정확도가 낮습니다 (±${Math.round(accuracy)}m).\n` +
            `창문 근처나 야외로 이동해주세요.`
          );
        }
        
        // 거리 계산
        const distance = this.calculateDistance(
          this.state.currentLocation.lat,
          this.state.currentLocation.lng,
          this.state.workplace.location_lat,
          this.state.workplace.location_lng
        );
        
        // 거리 체크
        if (distance > allowedRadius) {
          throw new Error(
            `${requiredAction}은(는) 근무지 ${allowedRadius}m 이내에서만 가능합니다.\n` +
            `현재 거리: ${Math.round(distance)}m`
          );
        }
        
        return {
          verified: true,
          location: {
            lat: this.state.currentLocation.lat,
            lng: this.state.currentLocation.lng
          },
          accuracy: Math.round(accuracy),
          distance: Math.round(distance)
        };
      },
      
      // ==================== 출퇴근 기록 ====================
      async recordAttendance(type) {
        try {
          // GPS 위치 검증
          const verification = await this.verifyLocation('출퇴근 기록');
          
          this.showToast(`${type} 기록 중...`, 'info');
          
          // DB에 저장
          const { data, error } = await this.sb
            .from('attendance')
            .insert({
              employee_id: this.state.employee.id,
              apartment_id: this.state.workplace.id,
              location_id: this.state.workplace.id,
              type: type,
              location_lat: verification.location.lat,
              location_lng: verification.location.lng,
              gps_accuracy: verification.accuracy,
              distance_from_workplace: verification.distance,
              timestamp: new Date().toISOString()
            });
          
          if (error) throw error;
          
          this.showToast(`✅ ${type} 기록 완료!`, 'success');
          
          // 오늘의 기록 새로고침
          await this.loadTodayAttendance();
          
        } catch (error) {
          console.error('출퇴근 기록 실패:', error);
          this.showToast(`❌ ${error.message}`, 'error');
        }
      },
      
      async loadTodayAttendance() {
        const today = new Date().toISOString().split('T')[0];
        
        const { data, error } = await this.sb
          .from('attendance')
          .select('*')
          .eq('employee_id', this.state.employee.id)
          .gte('timestamp', today + 'T00:00:00')
          .order('timestamp', { ascending: false });
        
        if (error) {
          console.error('기록 로드 실패:', error);
          return;
        }
        
        const container = document.getElementById('today-attendance');
        
        if (!data || data.length === 0) {
          container.innerHTML = `
            <div class="text-center text-gray-400 py-8">
              <i class="fas fa-clipboard-list text-4xl mb-2"></i>
              <div>기록이 없습니다</div>
            </div>
          `;
          return;
        }
        
        container.innerHTML = data.map(record => {
          const time = new Date(record.timestamp).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
          const typeIcons = {
            '출근': { icon: 'fa-sign-in-alt', color: 'text-green-600', bg: 'bg-green-50' },
            '퇴근': { icon: 'fa-sign-out-alt', color: 'text-orange-600', bg: 'bg-orange-50' },
            '휴게 시작': { icon: 'fa-coffee', color: 'text-blue-600', bg: 'bg-blue-50' },
            '휴게 종료': { icon: 'fa-play', color: 'text-purple-600', bg: 'bg-purple-50' }
          };
          const style = typeIcons[record.type] || typeIcons['출근'];
          
          return `
            <div class="${style.bg} border-l-4 border-${style.color.split('-')[1]}-500 p-3 rounded">
              <div class="flex items-center justify-between">
                <div class="flex items-center gap-2">
                  <i class="fas ${style.icon} ${style.color}"></i>
                  <span class="font-bold">${record.type}</span>
                </div>
                <span class="text-sm text-gray-600">${time}</span>
              </div>
              <div class="text-xs text-gray-500 mt-1">
                📍 ${record.distance_from_workplace}m (±${record.gps_accuracy}m)
              </div>
            </div>
          `;
        }).join('');
      },
      
      // ==================== UI 렌더링 ====================
      renderUI() {
        if (this.state.employee) {
          document.getElementById('header-name').textContent = this.state.employee.name;
          document.getElementById('header-role').textContent = this.state.employee.position || '직원';
        }
        
        // 오늘의 기록 로드
        this.loadTodayAttendance();
      },
      
      // ==================== 이벤트 리스너 ====================
      setupEventListeners() {
        // 탭 전환
        document.querySelectorAll('.tab-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const tab = btn.dataset.tab;
            this.switchTab(tab);
          });
        });
        
        // 출퇴근 버튼
        document.getElementById('btn-checkin').addEventListener('click', () => this.recordAttendance('출근'));
        document.getElementById('btn-checkout').addEventListener('click', () => this.recordAttendance('퇴근'));
        document.getElementById('btn-break-start').addEventListener('click', () => this.recordAttendance('휴게 시작'));
        document.getElementById('btn-break-end').addEventListener('click', () => this.recordAttendance('휴게 종료'));
        
        // 새로고침 버튼
        document.getElementById('btn-refresh-attendance').addEventListener('click', () => this.loadTodayAttendance());
        
        // 로그아웃
        document.getElementById('btn-logout').addEventListener('click', () => {
          if (confirm('로그아웃 하시겠습니까?')) {
            localStorage.clear();
            location.reload();
          }
        });
        
        // Before/After 토글
        document.getElementById('before-after-toggle').addEventListener('change', (e) => {
          if (e.target.checked) {
            document.getElementById('single-photo-mode').classList.add('hidden');
            document.getElementById('before-after-mode').classList.remove('hidden');
          } else {
            document.getElementById('single-photo-mode').classList.remove('hidden');
            document.getElementById('before-after-mode').classList.add('hidden');
          }
        });
        
        // 사진 촬영/선택 (기본 기능만 - 상세 구현은 scan.html 참고)
        document.getElementById('btn-take-photo').addEventListener('click', () => {
          document.getElementById('file-photo').click();
        });
        
        document.getElementById('btn-select-photo').addEventListener('click', () => {
          document.getElementById('file-gallery').click();
        });
        
        // 구매 요청 버튼 (scan.html의 모달 재사용)
        document.getElementById('btn-new-purchase').addEventListener('click', () => {
          this.showToast('구매 요청 기능은 scan.html 페이지를 참고하세요', 'info');
          // 실제로는 scan.html의 모달 코드를 여기에 복사해야 함
        });
        
        document.getElementById('btn-my-purchases').addEventListener('click', () => {
          this.showToast('구매 목록 기능은 scan.html 페이지를 참고하세요', 'info');
        });
      },
      
      // ==================== 탭 전환 ====================
      switchTab(tab) {
        // 탭 버튼 스타일
        document.querySelectorAll('.tab-btn').forEach(btn => {
          if (btn.dataset.tab === tab) {
            btn.classList.add('border-blue-500', 'text-blue-500');
            btn.classList.remove('border-transparent', 'text-gray-500');
          } else {
            btn.classList.remove('border-blue-500', 'text-blue-500');
            btn.classList.add('border-transparent', 'text-gray-500');
          }
        });
        
        // 탭 콘텐츠
        document.querySelectorAll('.tab-content').forEach(content => {
          content.classList.add('hidden');
        });
        document.getElementById(`tab-${tab}`).classList.remove('hidden');
        
        this.state.currentTab = tab;
      },
      
      // ==================== Toast 알림 ====================
      showToast(message, type = 'info') {
        const toast = document.getElementById('toast');
        const icon = document.getElementById('toast-icon');
        const text = document.getElementById('toast-message');
        
        const icons = {
          success: 'fa-check-circle',
          error: 'fa-exclamation-circle',
          warning: 'fa-exclamation-triangle',
          info: 'fa-info-circle'
        };
        
        const colors = {
          success: 'bg-green-600',
          error: 'bg-red-600',
          warning: 'bg-orange-600',
          info: 'bg-gray-800'
        };
        
        icon.className = `fas ${icons[type] || icons.info}`;
        toast.className = `fixed top-4 left-1/2 transform -translate-x-1/2 ${colors[type] || colors.info} text-white px-6 py-3 rounded-lg shadow-lg z-[100] transition-all`;
        text.textContent = message;
        
        toast.classList.remove('hidden');
        
        setTimeout(() => {
          toast.classList.add('hidden');
        }, 3000);
      }
    };
    
    // ==================== 앱 시작 ====================
    document.addEventListener('DOMContentLoaded', () => {
      app.init();
    });
  </script>
</body>
